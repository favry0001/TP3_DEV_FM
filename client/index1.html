<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Cocktails</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
 
    <div class="container py-4">
 
        <!-- En-tête -->
        <h1 class="text-center mb-4">Gestion des Cocktails</h1>
 
        <!-- Barre de navigation -->
        <div class="barre-navigation p-3 mb-5 d-flex justify-content-center align-items-center flex-wrap gap-3">
 
            <button class="btn btn-primary" onclick="lister()">Lister</button>
 
            <button class="btn btn-secondary" onclick="listerParIngredient()">Lister selon l'ingrédient</button>
 
            <button class="btn btn-warning" onclick="listerEntreDeuxPrix()">Lister entre 2 prix</button>
 
            <button class="btn btn-warning" onclick="chercherParId()">Chercher par Id</button>
 
            <button class="btn btn-warning" onclick="chercherParNom()">Chercher par nom</button>
 
            <div class="ms-md-auto">
                <select class="form-select w-auto" id="trierPar" onchange="trierCocktails(this.value)">
                    <option selected disabled value="">Trier par</option>
                    <option value="nom">Nom</option>
                    <option value="prix">Prix</option>
                </select>
            </div>
 
        </div>
 
        <!-- Zone d'affichage des cocktails -->
        <div class="row row-cols-1 row-cols-md-4 g-4" id="zoneCocktails">
            <!-- Les cards sont générées dynamiquement par app.js via Cocktail.obtenirCardCocktail() -->
        </div>
 
    </div>
 
    
    <footer class="text-center py-3">
        &copy; 𓂃˖ ࣪⊹ Fab Cocktails-2026 ⋆.˚ ★
    </footer>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    
    <script type="module" src="./js/app.js"></script>
 
</body>
</html>
